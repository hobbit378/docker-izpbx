name: Build Image

on:

  workflow_dispatch:
    inputs:
      version:
        description: semver version string (e.g. 20.16.5_SUFFIX)  
        type: string
        required: true
      build:
        type: string
        required: false
      debug:
        type: boolean
        required: false
        default: false
      platforms:
        type: string
        required: false
        default: 'linux/amd64'

  push:
    paths: 
      - 'CHANGELOG*' 

    tags:
      - 'v*'  

jobs:

  build:
    runs-on: ubuntu-latest
    
    steps:

      - name: Determine and set build date
        id: date
        run: echo "date='$(date +%s)'" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Checkout Code
        uses: actions/checkout@v4.1.7
      
      - name: Create Image Tags and Labels
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          # list of Docker images to use as base name for tags
          images: |
            ghcr.io/hobbit378/izpbx-asterisk
          # generate Docker tags based on the following events/attributes
          tags: |
            # set version tag from user input
            type=raw,value=${{ inputs.version }}
            # set version from git tag
            type=semver,pattern={{version}}
            # set main version
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.source=https://github.com/hobbit378/docker-izpbx
            org.opencontainers.image.authors='hobbit378@github'
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            commit=${{ format('{0}({1})',github.sha,github.ref) }}



      - name: Build and Push Image
        uses: docker/build-push-action@v6.6.0
        with:
          platforms: ${{ inputs.platforms || 'linux/amd64' }}
          context: ./izpbx-asterisk/
          build-args: APP_VER=${{ inputs.version || vars.APP_VER }}  APP_DEBUG=${{ contains(inputs.debug,true) && 1 || 0 }} APP_VER_BUILD=${{ inputs.build || '1' }} \
                      APP_BUILD_COMMIT=${{ github.sha || 'na' }} APP_BUILD_DATE=${{ steps.date.outputs.date }} 
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
